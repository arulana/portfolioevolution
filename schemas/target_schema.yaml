version: "1.0"
description: >
  Target output schema for BDI integration.
  Maps canonical simulation output to the shape expected by
  BDI onboarding and automation workflows.

portfolio_rollforward:
  file_format: csv
  columns:
    - source: "as_of_date"
      target: "REPORTING_DATE"
    - source: "instrument_id"
      target: "LOAN_ID"
    - source: "counterparty_name"
      target: "BORROWER_NAME"
    - source: "position_type"
      target: "POSITION_TYPE"
    - source: "funded_amount"
      target: "OUTSTANDING_BAL"
    - source: "committed_amount"
      target: "COMMITMENT_AMT"
    - source: "undrawn_amount"
      target: "AVAILABLE"
    - source: "utilisation_rate"
      target: "UTILISATION_PCT"
      transform: "decimal_to_percent"
    - source: "coupon_rate"
      target: "INTEREST_RATE"
      transform: "decimal_to_percent"
    - source: "coupon_type"
      target: "RATE_TYPE"
    - source: "internal_rating"
      target: "RISK_RATING"
    - source: "internal_rating_numeric"
      target: "RISK_RATING_NUM"
    - source: "segment"
      target: "SEGMENT"
    - source: "subsegment"
      target: "PROPERTY_TYPE"
    - source: "product_type"
      target: "PRODUCT_CLASS"
    - source: "industry"
      target: "INDUSTRY"
    - source: "geography"
      target: "STATE"
    - source: "origination_date"
      target: "ORIG_DATE"
    - source: "maturity_date"
      target: "MATURITY_DATE"
    - source: "payment_type"
      target: "PMT_TYPE"
    - source: "amortisation_type"
      target: "AMORT_TYPE"
    - source: "relationship_manager"
      target: "RM_NAME"
    - source: "team"
      target: "TEAM"
    - source: "default_flag"
      target: "DEFAULT_FLAG"
    - source: "watchlist_flag"
      target: "WATCHLIST_FLAG"
    - source: "pipeline_stage"
      target: "PIPELINE_STAGE"

daily_aggregates:
  file_format: csv
  columns:
    - source: "as_of_date"
      target: "DATE"
    - source: "total_funded_balance"
      target: "TOTAL_FUNDED_BAL"
    - source: "total_committed"
      target: "TOTAL_COMMITMENT"
    - source: "total_pipeline_value"
      target: "TOTAL_PIPELINE"
    - source: "net_origination"
      target: "NET_ORIGINATION"
    - source: "net_runoff"
      target: "NET_RUNOFF"
    - source: "pipeline_funded"
      target: "DEALS_FUNDED"
    - source: "pipeline_dropped"
      target: "DEALS_DROPPED"
    - source: "funded_matured"
      target: "LOANS_MATURED"

event_log:
  file_format: csv
  columns:
    - source: "event_id"
      target: "EVENT_ID"
    - source: "as_of_date"
      target: "EVENT_DATE"
    - source: "instrument_id"
      target: "LOAN_ID"
    - source: "event_type"
      target: "EVENT_TYPE"
    - source: "reason_code"
      target: "REASON"
    - source: "previous_state"
      target: "PREV_STATE"
    - source: "new_state"
      target: "NEW_STATE"
