version: "3.8"
services:
  api:
    build: .
    ports:
      - "8000:8000"
      - "5433:5433"
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    environment:
      - DB_PATH=/app/outputs/simulation.duckdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
