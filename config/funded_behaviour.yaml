# ============================================================================
# Funded Portfolio Behaviour Rules
# ============================================================================
# Controls how funded positions evolve daily.
# Calibrated for a community bank CRE/C&I portfolio.
# ============================================================================

amortisation:
  linear:
    daily_factor_from_tenor: true
    description: "Daily principal reduction = funded_amount / remaining_days"
  bullet:
    repay_at_maturity: true
    description: "Full principal returned at maturity"
  interest_only:
    no_scheduled_amort: true
    description: "No principal reduction; full balance due at maturity"
  revolving:
    no_scheduled_amort: true
    description: "No scheduled amort; balance fluctuates with draws/repays"
  sculpted:
    schedule_from_config: true
    description: "Custom repayment schedule per instrument"

maturity:
  action: renew                 # runoff | renew
  grace_period_days: 0
  description: "At maturity, eligible loans re-enter underwriting for renewal"

renewal:
  enabled: true
  base_renewal_probability: 0.65
  segment_overrides:
    cre: 0.70
    c_and_i: 0.60
    construction: 0.40
  rating_overrides:
    "1": 0.85
    "2": 0.80
    "3": 0.75
    "4": 0.70
    "5": 0.60
    "6": 0.40
    "7": 0.20
    "8": 0.05
    "9": 0.00
  renewal_term_months: null     # null = same tenor as original
  renewal_rate_adjustment_bps: 0

# Phase 2: prepayment rules
prepayment:
  enabled: false
  base_daily_probability: 0.0003    # ~7.5% annualised
  rate_sensitivity: -0.5            # Higher rates → less prepayment
  segment_overrides:
    cre: 0.0002
    c_and_i: 0.0004
  minimum_age_days: 90              # No prepayment in first 90 days

# Phase 2: utilisation dynamics
utilisation:
  enabled: false
  model: mean_reversion             # mean_reversion | event_driven
  mean_reversion:
    target_by_product:
      cre_term: 0.95
      cre_multifamily: 0.98
      cre_construction: 0.60
      c_and_i_loc: 0.45
      c_and_i_secured: 0.90
      c_and_i_owner_occupied: 0.95
    reversion_speed: 0.02           # Daily mean-reversion speed
    volatility: 0.01                # Daily volatility
  bounds:
    min: 0.0
    max: 1.0
