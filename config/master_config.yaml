# ============================================================================
# Master Configuration — Portfolio Evolution Engine
# ============================================================================
# Calibrated for a US superregional bank ($50-200B assets, ~$63B commercial).
# Sector keys = Karen's 21 industry sectors (normalized).
# Portfolio composition: 38% CRE, 50% C&I, 8% Construction, 4% Specialty.
# ============================================================================

# --- BASIC ---

simulation_horizon_days: 365
num_paths: 1
random_seed: 42
time_step: daily
mode: deterministic_forecast

# --- DATA ---

funded_file: "data/sample/funded_portfolio.csv"
pipeline_file: "data/sample/pipeline.csv"
schema_mapping: "schemas/schema_mapping.yaml"
source_schema: "schemas/source_schema.yaml"

# --- CALENDAR ---

calendar:
  business_days_only: true
  country: US
  start_date: null

# --- DEPOSITS ---

deposits:
  enabled: true
  deposits_file: "data/sample/deposits.csv"
  schema_mapping: "schemas/deposit_schema_mapping.yaml"
  relationships_file: null
  capture_at_funding: true
  pricing_enabled: true
  liquidity_metrics: true

# --- DATABRICKS ---

databricks:
  enabled: true
  catalog: bdi_data_201
  schema: synthetic_bank

# --- SCHEDULER ---

scheduler:
  enabled: false
  mode: realtime
  cadence: daily
  run_time: "06:00"
  accelerated_ratio: 5
  catch_up_on_start: true

# --- PIPELINE ---

pipeline:
  enabled: true
  allow_partial_funding: true
  new_pipeline_inflow: true
  inflow:
    deals_per_week: 250
    # Weights across Karen's 21 industry sectors.
    # CRE total 38%, C&I total 50%, Construction 8%, Specialty 4%.
    segment_weights:
      # CRE (38% — includes former multifamily allocation)
      real_estate_and_leasing: 0.38
      # C&I (50% distributed across 13 sectors)
      agriculture: 0.03
      manufacturing: 0.07
      mining_and_extraction: 0.02
      wholesale_trade: 0.04
      retail_trade: 0.05
      transportation: 0.03
      information: 0.03
      technology: 0.05
      professional_services: 0.05
      admin_and_waste_mgmt: 0.03
      other_services: 0.04
      holding_companies: 0.03
      utilities: 0.03
      # Construction (8%)
      construction: 0.08
      # Specialty (4% distributed across 6 sectors)
      government: 0.005
      education: 0.005
      healthcare: 0.015
      finance_and_insurance: 0.005
      arts_and_recreation: 0.005
      food_and_accommodation: 0.005
    avg_deal_size: 4000000
    deal_size_std: 3000000
    seasonality: true
    rating_distribution: [0.03, 0.08, 0.18, 0.32, 0.22, 0.12, 0.03, 0.01, 0.01]

# --- FUNDED PORTFOLIO ---

funded:
  amortisation_enabled: true
  renewal_enabled: true
  prepayment_enabled: true
  utilisation_sim_enabled: false

# --- RATINGS ---

ratings:
  enabled: true
  approach: matrix_hybrid
  migration_cadence: monthly

# --- VALUATION ---

valuation:
  enabled: false
  fair_value_mode: simple

# --- STRATEGY ---

strategy:
  enabled: false
  signals_file: null
  archetype: null

# --- SCENARIOS ---

scenarios:
  enabled: false
  definitions:
    - "config/scenarios/baseline.yaml"

# --- OUTPUT ---

output:
  directory: "outputs/"
  store_position_level_history: true
  store_event_log: true
  aggregate_frequency: daily
  formats:
    - csv
  target_schema: null

# --- ADVANCED ---

performance:
  vectorize: true
  checkpoint_interval: 0
  max_memory_gb: 16
