# ============================================================================
# Master Configuration — Portfolio Evolution Engine
# ============================================================================
# Calibrated for a US superregional bank ($50-200B assets, ~$63B commercial).
# ============================================================================

# --- BASIC ---

simulation_horizon_days: 365
num_paths: 1
random_seed: 42
time_step: daily
mode: deterministic_forecast

# --- DATA ---

funded_file: "data/sample/funded_portfolio.csv"
pipeline_file: "data/sample/pipeline.csv"
schema_mapping: "schemas/schema_mapping.yaml"
source_schema: "schemas/source_schema.yaml"

# --- CALENDAR ---

calendar:
  business_days_only: true
  country: US
  start_date: null

# --- DEPOSITS ---

deposits:
  enabled: true
  deposits_file: "data/sample/deposits.csv"
  schema_mapping: "schemas/deposit_schema_mapping.yaml"
  relationships_file: null
  capture_at_funding: true
  pricing_enabled: true
  liquidity_metrics: true

# --- SCHEDULER ---

scheduler:
  enabled: false
  mode: realtime
  cadence: daily
  run_time: "06:00"
  accelerated_ratio: 5
  catch_up_on_start: true

# --- PIPELINE ---

pipeline:
  enabled: true
  allow_partial_funding: true
  new_pipeline_inflow: true
  inflow:
    deals_per_week: 50
    segment_weights:
      cre: 0.28
      c_and_i: 0.48
      multifamily: 0.12
      construction: 0.07
      specialty: 0.05
    avg_deal_size: 4000000
    deal_size_std: 3000000
    seasonality: true
    rating_distribution: [0.03, 0.08, 0.18, 0.32, 0.22, 0.12, 0.03, 0.01, 0.01]

# --- FUNDED PORTFOLIO ---

funded:
  amortisation_enabled: true
  renewal_enabled: true
  prepayment_enabled: true
  utilisation_sim_enabled: false

# --- RATINGS ---

ratings:
  enabled: true
  approach: matrix_hybrid
  migration_cadence: monthly

# --- VALUATION ---

valuation:
  enabled: false
  fair_value_mode: simple

# --- STRATEGY ---

strategy:
  enabled: false
  signals_file: null
  archetype: null

# --- SCENARIOS ---

scenarios:
  enabled: false
  definitions:
    - "config/scenarios/baseline.yaml"

# --- OUTPUT ---

output:
  directory: "outputs/"
  store_position_level_history: true
  store_event_log: true
  aggregate_frequency: daily
  formats:
    - csv
  target_schema: null

# --- ADVANCED ---

performance:
  vectorize: true
  checkpoint_interval: 0
  max_memory_gb: 16
