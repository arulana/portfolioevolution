# ============================================================================
# Rating Migration Configuration
# ============================================================================
# Defines rating transition matrices and migration rules.
# Phase 2 feature — included here for completeness.
#
# The bank uses a 1-9 numeric scale mapped to canonical letter grades:
#   1=AAA, 2=AA, 3=A, 4=BBB, 5=BB, 6=B, 7=CCC, 8=CC, 9=D
# ============================================================================

approach: matrix_hybrid   # matrix | score | matrix_hybrid
cadence: monthly          # monthly | daily
absorbing_states: ["D"]   # Default is absorbing — no migration out

# Annual transition matrix (rows = from, columns = to)
# Converted to daily probabilities by the engine.
# Calibrated from Moody's published corporate transition data,
# adjusted for community bank portfolio characteristics.
annual_transition_matrix:
  ratings: ["AAA", "AA", "A", "BBB", "BB", "B", "CCC", "CC", "D"]
  matrix:
    #         AAA     AA      A       BBB     BB      B       CCC     CC      D
    AAA:  [0.9200, 0.0650, 0.0100, 0.0030, 0.0010, 0.0005, 0.0003, 0.0001, 0.0001]
    AA:   [0.0100, 0.9150, 0.0550, 0.0120, 0.0040, 0.0020, 0.0010, 0.0005, 0.0005]
    A:    [0.0020, 0.0250, 0.9100, 0.0450, 0.0100, 0.0040, 0.0020, 0.0010, 0.0010]
    BBB:  [0.0005, 0.0050, 0.0400, 0.8900, 0.0400, 0.0150, 0.0050, 0.0025, 0.0020]
    BB:   [0.0002, 0.0010, 0.0080, 0.0500, 0.8600, 0.0500, 0.0170, 0.0080, 0.0058]
    B:    [0.0001, 0.0005, 0.0020, 0.0100, 0.0500, 0.8500, 0.0500, 0.0200, 0.0174]
    CCC:  [0.0001, 0.0002, 0.0010, 0.0030, 0.0150, 0.0600, 0.7800, 0.0800, 0.0607]
    CC:   [0.0000, 0.0001, 0.0005, 0.0010, 0.0050, 0.0200, 0.0800, 0.7000, 0.1934]
    D:    [0.0000, 0.0000, 0.0000, 0.0000, 0.0000, 0.0000, 0.0000, 0.0000, 1.0000]

# Watchlist effect: multiplier on downgrade probability
watchlist_downgrade_multiplier: 1.5

# Scenario stress overlay: multiply downgrade/default columns
# Applied on top of the base matrix
scenario_stress_multipliers:
  baseline: 1.0
  mild_recession: 1.3
  severe_stress: 2.0

# Segment-specific adjustments
segment_adjustments:
  cre:
    downgrade_multiplier: 1.1
    description: "CRE slightly more volatile in migration"
  c_and_i:
    downgrade_multiplier: 1.0
  construction:
    downgrade_multiplier: 1.3
    description: "Construction has higher migration volatility"
