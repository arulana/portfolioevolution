# Growth-Oriented Commercial Bank Archetype
archetype_id: growth_commercial
name: "Growth-Oriented Commercial Bank"
description: >
  Aggressive growth bank. High origination volume, competitive pricing,
  accepts more risk for market share. C&I and CRE mix.

pipeline_behaviour:
  conversion_speed: 1.20
  fallout_rate: 0.80
  average_deal_size_range: [500000, 50000000]

pricing:
  aggressiveness: 1.15
  fixed_rate_preference: 0.40
  typical_spread_range_bps: [150, 300]

credit:
  rating_tolerance: 6
  average_rating: 4.8
  watchlist_threshold: 7

utilisation:
  revolver_target: 0.50
  term_target: 0.92

renewal:
  base_tendency: 0.60
  relationship_premium: 0.05

tenor:
  preference_months: 60
  max_months: 120

sector_appetite:
  multifamily: 1.10
  retail: 1.10
  office: 1.00
  construction: 1.10
  c_and_i: 1.20
  healthcare: 1.00

stress_behaviour:
  tightening_speed: moderate
  cre_reduction_under_stress: 0.75

deposit_priors:
  deposit_capture_base: 0.55
  operating_balance_ratio: 0.12
  deposit_beta_tolerance: 0.55
  deposit_growth_appetite: 1.00
  deposit_pricing_aggressiveness: 1.10
  brokered_reliance: 0.20
