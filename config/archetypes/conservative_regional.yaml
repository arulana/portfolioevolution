# Conservative Regional Bank Archetype
archetype_id: conservative_regional
name: "Conservative Regional Bank"
description: >
  Risk-averse regional bank. Diversified portfolio, strong credit quality,
  slower growth, wider spreads. Prioritises stability over volume.

pipeline_behaviour:
  conversion_speed: 0.85
  fallout_rate: 1.20
  average_deal_size_range: [1000000, 25000000]

pricing:
  aggressiveness: 0.85
  fixed_rate_preference: 0.55
  typical_spread_range_bps: [225, 400]

credit:
  rating_tolerance: 4
  average_rating: 3.8
  watchlist_threshold: 5

utilisation:
  revolver_target: 0.40
  term_target: 0.95

renewal:
  base_tendency: 0.65
  relationship_premium: 0.08

tenor:
  preference_months: 48
  max_months: 84

sector_appetite:
  multifamily: 1.00
  retail: 0.80
  office: 0.75
  construction: 0.60
  c_and_i: 1.10
  healthcare: 1.05

stress_behaviour:
  tightening_speed: fast
  cre_reduction_under_stress: 0.70

deposit_priors:
  deposit_capture_base: 0.65
  operating_balance_ratio: 0.18
  deposit_beta_tolerance: 0.35
  deposit_growth_appetite: 1.05
  deposit_pricing_aggressiveness: 0.85
  brokered_reliance: 0.05
