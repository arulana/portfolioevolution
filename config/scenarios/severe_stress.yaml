# Severe Stress Scenario
scenario_id: severe_stress
name: "Severe Stress"
description: >
  Deep recession. GDP contracts ~4%, unemployment rises to 9%,
  CRE values drop 25-30%, credit markets seize. Widespread defaults
  in CRE, construction, hospitality. Pipeline near-frozen.

macro_factors:
  benchmark_rate_shift_bps: -150
  credit_spread_shift_bps: 200
  growth_factor: 0.60
  inflation_factor: 0.85
  unemployment_factor: 2.0
  sector_stress:
    real_estate: 2.0
    hospitality: 2.5
    retail_trade: 1.8
    construction: 2.2
    entertainment: 2.0
    mining_energy: 1.5
    transportation: 1.3
  geography_stress: {}

transition_modifiers:
  booking_rate_multiplier: 0.40
  fallout_rate_multiplier: 2.00
  prepayment_multiplier: 0.50
  renewal_multiplier: 0.60
  utilisation_multiplier: 1.30
  downgrade_multiplier: 2.00
  default_multiplier: 3.00
  upgrade_multiplier: 0.30

pricing_modifiers:
  new_business_spread_shift_bps: 100
  refinance_spread_shift_bps: 75

# Phase 1.1: Deposit modifiers
deposit_modifiers:
  deposit_runoff_multiplier: 1.60
  deposit_beta_shift: 0.15
  operating_balance_multiplier: 0.75
  deposit_capture_multiplier: 0.50
  brokered_inflow_multiplier: 1.60
  term_deposit_renewal_multiplier: 0.60
