# Mild Recession Scenario
scenario_id: mild_recession
name: "Mild Recession"
description: >
  Moderate economic downturn. GDP contracts ~1%, unemployment rises to 5.5%,
  Fed cuts rates 75bps. CRE and hospitality sectors under moderate stress.
  Pipeline slows, defaults tick up, spreads widen.

macro_factors:
  benchmark_rate_shift_bps: -75
  credit_spread_shift_bps: 50
  growth_factor: 0.85
  inflation_factor: 0.95
  unemployment_factor: 1.25
  sector_stress:
    real_estate: 1.3
    hospitality: 1.4
    retail_trade: 1.2
    construction: 1.3
    entertainment: 1.3
  geography_stress: {}

transition_modifiers:
  booking_rate_multiplier: 0.80
  fallout_rate_multiplier: 1.25
  prepayment_multiplier: 0.85
  renewal_multiplier: 0.90
  utilisation_multiplier: 1.10
  downgrade_multiplier: 1.30
  default_multiplier: 1.50
  upgrade_multiplier: 0.70

pricing_modifiers:
  new_business_spread_shift_bps: 25
  refinance_spread_shift_bps: 15

# Phase 1.1: Deposit modifiers
deposit_modifiers:
  deposit_runoff_multiplier: 1.20
  deposit_beta_shift: 0.05
  operating_balance_multiplier: 0.90
  deposit_capture_multiplier: 0.85
  brokered_inflow_multiplier: 1.30
